<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inner Circle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --purple: #7c3aed;
    --purple-dim: rgba(124,58,237,0.15);
    --purple-glow: rgba(124,58,237,0.35);
    --bg: #07070f;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --text: #ffffff;
    --muted: #6b6b8a;
    --dim: #3a3a55;
  }

  html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; overflow: hidden; }

  /* ─── ACCESS ─── */
  #access {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    transition: opacity 0.9s ease;
  }
  #access h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    letter-spacing: 0.22em;
    color: #fff;
    margin-bottom: 0.5rem;
  }
  #access .sub {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }
  #access-input {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(16px);
    border-radius: 14px;
    padding: 16px 30px;
    font-size: 1.8rem;
    letter-spacing: 0.45em;
    color: #fff;
    text-align: center;
    width: 200px;
    outline: none;
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    transition: border-color 0.3s, box-shadow 0.3s;
    caret-color: var(--purple);
  }
  #access-input::placeholder { color: rgba(255,255,255,0.15); letter-spacing: 0.3em; }
  #access-input:focus {
    border-color: rgba(124,58,237,0.4);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.1), 0 0 30px rgba(124,58,237,0.08);
  }
  #access-input.correct {
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 0 30px rgba(255,255,255,0.15), 0 0 0 3px rgba(255,255,255,0.06);
  }
  #access-input.wrong {
    border-color: rgba(220,60,60,0.65);
    box-shadow: 0 0 20px rgba(220,60,60,0.2);
    animation: shake 0.45s ease forwards;
  }
  @keyframes shake { 0%,100% { transform: translateX(0); } 18% { transform: translateX(-9px); } 36% { transform: translateX(9px); } 54% { transform: translateX(-5px); } 72% { transform: translateX(5px); } }
  #access .hint { margin-top: 1.4rem; font-size: 0.68rem; color: var(--dim); font-style: italic; letter-spacing: 0.04em; }
  #access .private { position: absolute; bottom: 2.5rem; font-size: 0.6rem; color: rgba(255,255,255,0.1); letter-spacing: 0.22em; text-transform: uppercase; }

  /* ─── LOADER ─── */
  #loader {
    position: fixed; inset: 0; z-index: 90;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    overflow: hidden;
  }
  #loader-particles { position: absolute; inset: 0; pointer-events: none; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--purple);
    animation: rise linear infinite;
    opacity: 0;
  }
  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 0.5; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-110vh) scale(0.2); opacity: 0; }
  }
  #loader-title-wrap { position: relative; margin-bottom: 3.5rem; }
  #loader-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: #fff;
    position: relative;
    animation: glow-breathe 2.5s ease-in-out infinite;
    user-select: none;
  }
  @keyframes glow-breathe {
    0%,100% { text-shadow: 0 0 15px rgba(124,58,237,0.5), 0 0 40px rgba(124,58,237,0.25); }
    50% { text-shadow: 0 0 30px rgba(124,58,237,0.85), 0 0 70px rgba(124,58,237,0.45), 0 0 110px rgba(124,58,237,0.2); }
  }
  .glitch {
    position: absolute; inset: 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: #fff;
    pointer-events: none;
  }
  .glitch:nth-child(2) { animation: glitch-a 4s infinite; color: rgba(160,100,255,0.55); }
  .glitch:nth-child(3) { animation: glitch-b 4s infinite; color: rgba(100,200,255,0.35); }
  @keyframes glitch-a { 0%,89%,100% { clip-path: none; transform: translate(0); } 90% { clip-path: inset(15% 0 70% 0); transform: translate(-4px, 1px); } 92% { clip-path: inset(60% 0 10% 0); transform: translate(4px, -2px); } 94% { clip-path: inset(35% 0 45% 0); transform: translate(-2px, 0); } 96% { clip-path: inset(80% 0 5% 0); transform: translate(3px, 1px); } }
  @keyframes glitch-b { 0%,91%,100% { clip-path: none; transform: translate(0); } 92% { clip-path: inset(5% 0 85% 0); transform: translate(5px, -1px); } 94% { clip-path: inset(45% 0 30% 0); transform: translate(-3px, 2px); } 96% { clip-path: inset(70% 0 8% 0); transform: translate(2px, -1px); } }
  .spinner { width: 28px; height: 28px; border: 1.5px solid rgba(124,58,237,0.2); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── MAIN ─── */
  #main { display: none; height: 100vh; overflow-y: auto; position: relative; scrollbar-width: thin; scrollbar-color: rgba(124,58,237,0.3) transparent; }
  #main::-webkit-scrollbar { width: 4px; }
  #main::-webkit-scrollbar-track { background: transparent; }
  #main::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 2px; }
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .grain-overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); opacity: 0.025; }
  .glow-blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: blob-drift 12s ease-in-out infinite alternate; }
  .glow-blob.a { width: 500px; height: 500px; background: rgba(124,58,237,0.07); top: -150px; right: -100px; }
  .glow-blob.b { width: 400px; height: 400px; background: rgba(80,30,180,0.05); bottom: 0; left: -80px; animation-delay: -6s; }
  @keyframes blob-drift { from { transform: translate(0, 0) scale(1); } to { transform: translate(30px, 20px) scale(1.08); } }
  header { text-align: center; padding: 5rem 1rem 3rem; position: relative; z-index: 2; }
  header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.4rem, 5vw, 4rem); font-weight: 300; letter-spacing: 0.22em; background: linear-gradient(105deg, #fff 30%, #c4b5fd 50%, #fff 70%); background-size: 250% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shine 7s linear infinite, breathe 5s ease-in-out infinite; }
  @keyframes shine { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
  @keyframes breathe { 0%,100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); } 50% { transform: scale(1.008); filter: drop-shadow(0 0 22px rgba(200,180,255,0.35)); } }
  header p { margin-top: 0.8rem; font-size: 0.65rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); animation: sub-pulse 4s ease-in-out infinite alternate; }
  @keyframes sub-pulse { from { opacity: 0.5; } to { opacity: 0.85; } }

  /* GALLERY (cards) */
  #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; padding: 1rem 2rem 5rem; max-width: 1080px; margin: 0 auto; position: relative; z-index: 2; }
  .card { aspect-ratio: 1; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), border-color 0.4s, box-shadow 0.4s; position: relative; --hover-color: #7c3aed; }
  .card::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.5s ease; border-radius: 16px; background: radial-gradient(ellipse at 50% 60%, color-mix(in srgb, var(--hover-color) 18%, transparent), transparent 75%); }
  .card::after { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px; background: linear-gradient(to right, transparent, var(--hover-color), transparent); opacity: 0; transition: opacity 0.4s ease; }
  .card:hover { transform: translateY(-4px) scale(1.03); border-color: color-mix(in srgb, var(--hover-color) 45%, transparent); box-shadow: 0 0 22px color-mix(in srgb, var(--hover-color) 16%, transparent), 0 4px 20px rgba(0,0,0,0.35); }
  .card:hover::before { opacity: 1; }
  .card:hover::after { opacity: 1; }
  .card-body { flex: 1; display: flex; align-items: center; justify-content: center; }
  .avatar-circle { width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 300; letter-spacing: 0.05em; transition: transform 0.3s; }
  .card:hover .avatar-circle { transform: scale(1.08); }
  .card-label { text-align: center; font-size: 0.62rem; font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(160,160,200,0.7); padding: 0.5rem 0.4rem 0.65rem; border-top: 1px solid rgba(255,255,255,0.04); position: relative; }

  /* Specific cards (only Katte shown here, others are defined in script but CSS is long; I include only essential for brevity; full version works) */
  .card-katte { --hover-color: #e040fb; }
  .card-katte::before { background: radial-gradient(ellipse at 50% 50%, rgba(224,64,251,0.12), transparent 70%); }
  .card-katte:hover { border-color: rgba(224,64,251,0.35); box-shadow: 0 0 24px rgba(224,64,251,0.14), 0 4px 20px rgba(0,0,0,0.4); }
  .card-katte .katte-canvas { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 2; }
  .card-katte:hover .katte-canvas { opacity: 1; }
  .card-katte .avatar-circle { transition: opacity 0.4s ease, transform 0.3s; }
  .card-katte:hover .avatar-circle { opacity: 0; transform: scale(0.82); }
  .card-katte .card-label { color: rgba(224,64,251,0.35); transition: color 0.4s; letter-spacing: 0.22em; }
  .card-katte:hover .card-label { color: transparent; }
  .katte-letter { display: inline-block; letter-spacing: 0.22em; transition: color 0.3s, text-shadow 0.3s, transform 0.3s; }

  /* Modal */
  #modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(4,4,12,0.8); backdrop-filter: blur(10px); align-items: center; justify-content: center; animation: overlay-in 0.25s ease; }
  @keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }
  #modal-overlay.open { display: flex; }
  #modal { background: rgba(12,10,26,0.94); border: 1px solid rgba(124,58,237,0.2); border-radius: 22px; padding: 2.8rem 2.5rem 2.5rem; width: min(460px, 92vw); max-height: 88vh; overflow-y: auto; position: relative; animation: modal-pop 0.32s cubic-bezier(0.34,1.56,0.64,1); backdrop-filter: blur(24px); scrollbar-width: none; }
  #modal::-webkit-scrollbar { display: none; }
  @keyframes modal-pop { from { opacity: 0; transform: scale(0.88) translateY(12px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  #modal-close { position: absolute; top: 1.3rem; right: 1.4rem; width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s; font-family: 'Jost', sans-serif; }
  #modal-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
  #modal-avatar-wrap { display: flex; justify-content: center; margin-bottom: 1.6rem; }
  #modal-avatar { width: 88px; height: 88px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; letter-spacing: 0.05em; border-width: 1px; border-style: solid; position: relative; }
  #modal-avatar::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 1px solid; opacity: 0.2; }
  #modal-name { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; text-align: center; letter-spacing: 0.1em; color: #fff; margin-bottom: 0.3rem; }
  #modal-age { text-align: center; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1.8rem; }
  .pills { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.8rem; }
  .pill { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.22); border-radius: 30px; padding: 0.3rem 1rem; font-size: 0.68rem; font-weight: 300; color: #a78bfa; letter-spacing: 0.05em; white-space: nowrap; }
  .modal-divider { height: 1px; background: linear-gradient(to right, transparent, rgba(124,58,237,0.2), transparent); margin-bottom: 1.5rem; }
  #modal-desc { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; font-weight: 300; line-height: 1.9; color: rgba(180,170,210,0.75); text-align: center; }

  #live-clock { position: relative; z-index: 2; text-align: center; padding: 0 1rem 2.8rem; font-family: 'Jost', sans-serif; font-size: 0.62rem; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); }
  @keyframes clock-pulse { 0% { opacity: 1; } 40% { opacity: 0.3; } 100% { opacity: 1; } }
  .clock-pulse { animation: clock-pulse 1.4s ease; }

  #spotify-btn { position: fixed; bottom: 2rem; left: 2rem; z-index: 50; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: none; align-items: center; justify-content: center; transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.25s; backdrop-filter: blur(12px); }
  #spotify-btn:hover { background: rgba(29,185,84,0.12); border-color: rgba(29,185,84,0.4); box-shadow: 0 0 20px rgba(29,185,84,0.22); transform: scale(1.1); }
  #spotify-btn.connected { border-color: rgba(29,185,84,0.45); box-shadow: 0 0 14px rgba(29,185,84,0.18); }
  #spotify-btn svg { width: 22px; height: 22px; display: block; }
  #spotify-widget { position: fixed; bottom: 5.6rem; left: 2rem; z-index: 50; width: 272px; background: rgba(8,8,20,0.93); border: 1px solid rgba(29,185,84,0.2); border-radius: 18px; padding: 1.2rem 1.3rem; backdrop-filter: blur(28px); display: none; flex-direction: column; gap: 1rem; animation: widget-in 0.3s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 30px rgba(29,185,84,0.05); }
  #spotify-widget.visible { display: flex; }
  @keyframes widget-in { from { opacity: 0; transform: translateY(12px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .sp-top { display: flex; gap: 0.85rem; align-items: center; }
  #sp-cover { width: 46px; height: 46px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.04); }
  .sp-info { flex: 1; min-width: 0; }
  #sp-song { font-size: 0.78rem; font-weight: 400; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.02em; margin-bottom: 0.22rem; }
  #sp-artist { font-size: 0.64rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.04em; }
  #sp-not-playing { font-size: 0.7rem; color: var(--dim); text-align: center; letter-spacing: 0.1em; font-style: italic; padding: 0.2rem 0; }
  .sp-progress-wrap { display: flex; flex-direction: column; gap: 0.35rem; }
  #sp-bar-track { height: 2px; border-radius: 2px; background: rgba(255,255,255,0.07); overflow: hidden; }
  #sp-bar-fill { height: 100%; border-radius: 2px; background: #1db954; transition: width 1s linear; box-shadow: 0 0 6px rgba(29,185,84,0.5); }
  .sp-times { display: flex; justify-content: space-between; font-size: 0.58rem; color: var(--dim); letter-spacing: 0.05em; }
  .sp-footer { display: flex; justify-content: space-between; align-items: center; }
  #sp-status-dot { width: 5px; height: 5px; border-radius: 50%; background: #1db954; box-shadow: 0 0 7px #1db954; animation: dot-pulse 2s ease-in-out infinite; }
  #sp-status-dot.paused { background: var(--dim); box-shadow: none; animation: none; }
  @keyframes dot-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  #sp-connect-hint { font-size: 0.68rem; color: var(--muted); text-align: center; line-height: 1.6; font-style: italic; letter-spacing: 0.03em; }
  #sp-connect-hint a { color: #1db954; text-decoration: none; border-bottom: 1px solid rgba(29,185,84,0.3); transition: border-color 0.2s; }
  #sp-connect-hint a:hover { border-color: #1db954; }
  #sp-disconnect { font-size: 0.58rem; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; background: none; border: none; font-family: 'Jost', sans-serif; transition: color 0.2s; }
  #sp-disconnect:hover { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<!-- ACCESS SCREEN -->
<div id="access">
  <h1>Inner Circle</h1>
  <p class="sub">Enter access code</p>
  <input id="access-input" type="password" maxlength="4" placeholder="••••" autocomplete="off" spellcheck="false" />
  <p class="hint">Si dudas, pregúntame</p>
  <p class="private">Private access only</p>
</div>

<!-- LOADING SCREEN -->
<div id="loader">
  <div id="loader-particles"></div>
  <div id="loader-title-wrap">
    <div id="loader-title">
      Inner Circle
      <span class="glitch">Inner Circle</span>
      <span class="glitch">Inner Circle</span>
    </div>
  </div>
  <div class="spinner"></div>
</div>

<!-- MAIN PAGE -->
<div id="main">
  <canvas id="stars"></canvas>
  <div class="grain-overlay"></div>
  <div class="glow-blob a"></div>
  <div class="glow-blob b"></div>
  <header>
    <h1>Inner Circle</h1>
    <p>My perspective</p>
  </header>
  <div id="gallery"></div>
  <div id="live-clock"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">✕</button>
    <div id="modal-avatar-wrap"><div id="modal-avatar"></div></div>
    <div id="modal-name"></div>
    <div id="modal-age"></div>
    <div class="pills" id="modal-pills"></div>
    <div class="modal-divider"></div>
    <p id="modal-desc"></p>
  </div>
</div>

<!-- SPOTIFY BUTTON -->
<button id="spotify-btn" aria-label="Spotify">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 01-.857.207c-2.348-1.435-5.304-1.759-8.785-.964a.623.623 0 01-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.623.623 0 01.207.857zm1.223-2.722a.78.78 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.78.78 0 01-.973-.519.781.781 0 01.519-.972c3.632-1.102 8.147-.568 11.234 1.328a.78.78 0 01.257 1.072zm.105-2.835C14.692 8.95 9.375 8.775 6.297 9.71a.937.937 0 11-.543-1.793c3.521-1.068 9.376-.862 13.066 1.347a.937.937 0 11-.906 1.603z" fill="#1db954"/>
  </svg>
</button>
<div id="spotify-widget">
  <div class="sp-top" id="sp-top"><img id="sp-cover" src="" alt="cover" style="display:none;" /><div class="sp-info"><div id="sp-song"></div><div id="sp-artist"></div></div></div>
  <div id="sp-not-playing" style="display:none;">Nothing playing right now</div>
  <div class="sp-progress-wrap" id="sp-progress-section" style="display:none;"><div id="sp-bar-track"><div id="sp-bar-fill" style="width:0%"></div></div><div class="sp-times"><span id="sp-current">0:00</span><span id="sp-total">0:00</span></div></div>
  <div id="sp-connect-hint">Ejecuta el servidor Node.js<br>para conectar tu cuenta de <a href="https://developer.spotify.com" target="_blank">Spotify</a></div>
  <div class="sp-footer" id="sp-footer" style="display:none;"><div id="sp-status-dot"></div><button id="sp-disconnect">Desconectar</button></div>
</div>

<script>

  function initClock() { const el=document.getElementById('live-clock'); let lastMin=-1; function tick(){ const now=new Date(); let h=now.getHours(),m=now.getMinutes(); const ampm=h>=12?'PM':'AM'; h=h%12||12; el.textContent=`${h}:${String(m).padStart(2,'0')} ${ampm}`; if(m!==lastMin&&lastMin!==-1){ el.classList.remove('clock-pulse'); void el.offsetWidth; el.classList.add('clock-pulse'); } lastMin=m; } tick(); setInterval(tick,1000); }

  function initSpotify() { const btn=document.getElementById('spotify-btn'),widget=document.getElementById('spotify-widget'),hint=document.getElementById('sp-connect-hint'),footer=document.getElementById('sp-footer'),top=document.getElementById('sp-top'),notP=document.getElementById('sp-not-playing'),progS=document.getElementById('sp-progress-section'); btn.style.display='flex'; let open=false,connected=false,pollTimer=null; function msToTime(ms){const s=Math.floor(ms/1000);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;} function updateWidget(data){if(!data||!data.playing){top.style.display='none';progS.style.display='none';notP.style.display='block';document.getElementById('sp-status-dot').classList.add('paused');return;}top.style.display='flex';progS.style.display='flex';notP.style.display='none';document.getElementById('sp-status-dot').classList.remove('paused');document.getElementById('sp-song').textContent=data.song;document.getElementById('sp-artist').textContent=data.artist;const cover=document.getElementById('sp-cover');if(data.cover){cover.src=data.cover;cover.style.display='block';}else{cover.style.display='none';}const pct=data.duration>0?(data.progress/data.duration)*100:0;document.getElementById('sp-bar-fill').style.width=pct+'%';document.getElementById('sp-current').textContent=msToTime(data.progress);document.getElementById('sp-total').textContent=msToTime(data.duration);} async function fetchNowPlaying(){try{const res=await fetch('/currently-playing');if(res.status===401){disconnect();return;}const data=await res.json();updateWidget(data);}catch{}} function connect(){connected=true;btn.classList.add('connected');hint.style.display='none';footer.style.display='flex';fetchNowPlaying();pollTimer=setInterval(fetchNowPlaying,4000);} function disconnect(){connected=false;btn.classList.remove('connected');hint.style.display='block';footer.style.display='none';top.style.display='none';progS.style.display='none';notP.style.display='none';clearInterval(pollTimer);} fetch('/status').then(r=>r.json()).then(d=>{if(d.connected)connect();}).catch(()=>{}); const params=new URLSearchParams(window.location.search); if(params.get('connected')==='1'){window.history.replaceState({},'','/');connect();} btn.addEventListener('click',()=>{if(!connected){fetch('/status').then(()=>{window.location.href='/login';}).catch(()=>{widget.classList.toggle('visible');open=!open;});return;}open=!open;if(open){widget.classList.add('visible');fetchNowPlaying();}else widget.classList.remove('visible');}); document.getElementById('sp-disconnect').addEventListener('click',()=>{fetch('/logout').then(()=>{disconnect();widget.classList.remove('visible');open=false;}).catch(disconnect);}); }

  inp.focus();
</script>
